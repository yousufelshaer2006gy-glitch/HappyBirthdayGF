<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <audio id="bg-music" src="02_Meaddy_El_Nas.mp3" loop></audio>
</head>
<body>
    <div class="cursor"></div>
    <div class="container">
        <h1>Happy Birthday Priya💗</h1>
        <div class="greeting"></div>
        <button class="cta-button">Click to Enter Our World 💕</button>
    </div>

    <script>
  document.addEventListener("DOMContentLoaded", function() {
    // تحديد الزرار البينك بأي طريقة ممكنة في صفحتك
    const enterBtn = document.querySelector('.click-to-enter-btn')  document.querySelector('button')  document.querySelector('.btn') || document.querySelector('a');
    const audio = document.getElementById('bg-music');

    if (enterBtn) {
      enterBtn.addEventListener('click', function() {
        if (audio) {
          audio.play().catch(function(err) {
            console.log("Playback error:", err);
          });
        }
      });
    }
  });
</script>
        
</body>
</html>
