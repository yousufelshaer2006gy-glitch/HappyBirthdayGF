<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="cause.css" href="style.css">
    <audio id="bg-music" src="02_Meaddy_El_Nas.mp3" loop></audio>
</head>
<body>
    <div class="cursor"></div>
    <div class="container">
        <h1>Happy Birthday saloma💗</h1>
        <div class="greeting"></div>
        <button class="cta-button">Click to Enter Our World 💕</button>
    </div>

  <script>
  document.addEventListener("DOMContentLoaded", function() {
    // حددنا الزرار بالاسم المكتوب في سطر 16 بالظبط
    const enterBtn = document.querySelector('.cta-button');
    const audio = document.getElementById('bg-music');

    if (enterBtn) {
      enterBtn.addEventListener('click', function(e) {
        // منع الانتقال اللحظي عشان الأغنية تلحق تبدأ اشتغال
        e.preventDefault(); 
        
        if (audio) {
          audio.play().then(function() {
            // أول ما الأغنية تشتغل، ينقله لصفحة الذكريات
            window.location.href = "last.html"; 
          }).catch(function(err) {
            console.log("Playback error:", err);
            // لو حصل أي بروتوكول منع، ينقله برضه عشان الموقع ميعلقش
            window.location.href = "last.html";
          });
        } else {
          window.location.href = "last.html";
        }
      });
    }
  });
</script>  
        
</body>
</html>
